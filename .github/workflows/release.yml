name: Release SDKs

on:
  push:
    branches: [main]
    paths:
      - openapi.yaml
  workflow_dispatch:

jobs:
  release:
    name: Generate & publish SDKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Capture OpenAPI diff
        run: |
          DIFF=$(git diff HEAD~1 -- openapi.yaml 2>/dev/null || echo "")
          {
            echo "OPENAPI_DIFF<<EOFMARKER"
            echo "$DIFF"
            echo "EOFMARKER"
          } >> $GITHUB_ENV

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate SDKs (local files)
        run: fern generate --group sdk --local --log-level debug

      - name: Bump patch version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('sdk/typescript/package.json', 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            pkg.version = \`\${major}.\${minor}.\${patch + 1}\`;
            fs.writeFileSync('sdk/typescript/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('TypeScript version:', pkg.version);
          "
          python3 -c "
          import re
          with open('sdk/python/pyproject.toml', 'r') as f:
              content = f.read()
          def bump(m):
              return f'version = \"{m.group(1)}.{m.group(2)}.{int(m.group(3))+1}\"'
          content = re.sub(r'version = \"(\d+)\.(\d+)\.(\d+)\"', bump, content, count=1)
          with open('sdk/python/pyproject.toml', 'w') as f:
              f.write(content)
          import re as r2
          v = r2.search(r'version = \"(.+?)\"', content).group(1)
          print('Python version:', v)
          "
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('sdk/n8n/package.json', 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            pkg.version = \`\${major}.\${minor}.\${patch + 1}\`;
            fs.writeFileSync('sdk/n8n/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('n8n node version:', pkg.version);
          "

      - name: Commit generated SDKs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/ sdk/python/pyproject.toml
          git diff --cached --quiet || git commit -m "chore: regenerate SDKs [skip ci]"
          git push

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          cp LICENSE sdk/typescript/LICENSE
          cd sdk/typescript
          npm install
          npm publish --access public --provenance

      - name: Publish to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install build twine
          cd sdk/python
          python -m build
          twine upload dist/* --username __token__ --password $PYPI_TOKEN

      - name: Build & publish n8n node
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          cp LICENSE sdk/n8n/LICENSE
          cd sdk/n8n
          npm install
          npm publish --access public --provenance

      - name: Generate release notes from OpenAPI diff
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          VERSION=$(node -e "console.log(require('./sdk/typescript/package.json').version)")
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          NOTES=""

          if [ -n "$OPENAPI_DIFF" ] && [ -n "$GEMINI_API_KEY" ]; then
            NOTES=$(curl -sf \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg diff "$OPENAPI_DIFF" '{
                contents: [{
                  parts: [{
                    text: ("You write release notes for a WhatsApp messaging SDK. Analyze this OpenAPI spec diff and write ONLY what actually changed: new endpoints, removed endpoints, changed parameters, new or removed response fields, renamed methods. If nothing changed in a category, do not mention it. Output only markdown bullet points, no intro sentence, no \"nothing changed\" statements.\n\nDiff:\n" + $diff)
                  }]
                }],
                generationConfig: {}
              }')" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null) || NOTES=""
          fi

          if [ -z "$NOTES" ]; then
            NOTES="SDK update."
          fi

          {
            echo "RELEASE_NOTES<<EOFMARKER"
            echo "$NOTES"
            echo "EOFMARKER"
          } >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            --title "v$RELEASE_VERSION" \
            --notes "$RELEASE_NOTES" \
            --latest

      - name: Update CHANGELOG.md
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const version = process.env.RELEASE_VERSION;
            const notes = process.env.RELEASE_NOTES;
            const date = new Date().toISOString().split('T')[0];
            const newEntry = \`\n## [\${version}] - \${date}\n\n\${notes}\n\`;
            const headerEnd = content.indexOf('\n## ');
            const insertAt = headerEnd === -1 ? content.length : headerEnd;
            const updated = content.slice(0, insertAt) + newEntry + content.slice(insertAt);
            fs.writeFileSync('CHANGELOG.md', updated);
          "
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG for v$RELEASE_VERSION [skip ci]"
          git push
