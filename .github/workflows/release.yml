name: Release SDKs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Notification de début ─────────────────────────────────────────────────
  notify-start:
    uses: ./.github/workflows/_discord_notif.yml
    with:
      message: "Release pipeline démarrée"
      status: "pending"
    secrets: inherit

  # ─── Pipeline principale ───────────────────────────────────────────────────
  release:
    name: Generate & publish SDKs
    needs: notify-start
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      packages: ${{ steps.summary.outputs.packages }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect OpenAPI change
        id: detect
        run: |
          if git diff HEAD~1 --name-only 2>/dev/null | grep -q "openapi.yaml"; then
            echo "openapi_changed=true" >> $GITHUB_OUTPUT
          else
            echo "openapi_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Capture OpenAPI diff (for release notes)
        run: |
          DIFF=$(git diff HEAD~1 -- openapi.yaml 2>/dev/null || echo "")
          {
            echo "OPENAPI_DIFF<<EOFMARKER"
            echo "$DIFF"
            echo "EOFMARKER"
          } >> $GITHUB_ENV

      - name: Install Fern & regenerate SDKs
        if: steps.detect.outputs.openapi_changed == 'true'
        run: |
          npm install -g fern-api
          fern generate --group sdk --local --log-level debug

      - name: Setup npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: Check & publish TypeScript SDK
        id: ts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          OPENAPI_CHANGED: ${{ steps.detect.outputs.openapi_changed }}
        run: bash .github/workflows/_publish-typescript.sh

      - name: Check & publish Python SDK
        id: python
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          OPENAPI_CHANGED: ${{ steps.detect.outputs.openapi_changed }}
        run: bash .github/workflows/_publish-python.sh

      - name: Check & publish n8n node
        id: n8n
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          OPENAPI_CHANGED: ${{ steps.detect.outputs.openapi_changed }}
        run: bash .github/workflows/_publish-n8n.sh

      - name: Commit regenerated SDKs
        if: steps.detect.outputs.openapi_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/
          git diff --cached --quiet || git commit -m "chore: regenerate SDKs [skip ci]"
          git push

      - name: Generate release notes
        if: steps.ts.outputs.published == 'true' || steps.python.outputs.published == 'true' || steps.n8n.outputs.published == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          VERSION=$(node -e "console.log(require('./sdk/typescript/package.json').version)")
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          NOTES=""

          if [ -n "$OPENAPI_DIFF" ] && [ -n "$GEMINI_API_KEY" ]; then
            NOTES=$(curl -sf \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg diff "$OPENAPI_DIFF" '{
                contents: [{parts: [{text: ("You write release notes for a WhatsApp messaging SDK. Analyze this OpenAPI spec diff and write ONLY what actually changed: new endpoints, removed endpoints, changed parameters, new or removed response fields, renamed methods. If nothing changed in a category, do not mention it. Output only markdown bullet points, no intro sentence, no \"nothing changed\" statements.\n\nDiff:\n" + $diff)}]}],
                generationConfig: {}
              }')" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null) || NOTES=""
          fi

          [ -z "$NOTES" ] && NOTES="SDK update."

          {
            echo "RELEASE_NOTES<<EOFMARKER"
            echo "$NOTES"
            echo "EOFMARKER"
          } >> $GITHUB_ENV

      - name: Create GitHub Release
        if: steps.ts.outputs.published == 'true' || steps.python.outputs.published == 'true' || steps.n8n.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            --title "v$RELEASE_VERSION" \
            --notes "$RELEASE_NOTES" \
            --latest

      - name: Update CHANGELOG.md
        if: steps.ts.outputs.published == 'true' || steps.python.outputs.published == 'true' || steps.n8n.outputs.published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const version = process.env.RELEASE_VERSION;
            const notes = process.env.RELEASE_NOTES;
            const date = new Date().toISOString().split('T')[0];
            const newEntry = \`\n## [\${version}] - \${date}\n\n\${notes}\n\`;
            const headerEnd = content.indexOf('\n## ');
            const insertAt = headerEnd === -1 ? content.length : headerEnd;
            const updated = content.slice(0, insertAt) + newEntry + content.slice(insertAt);
            fs.writeFileSync('CHANGELOG.md', updated);
          "
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG for v$RELEASE_VERSION [skip ci]"
          git push

      - name: Build packages summary
        id: summary
        if: always()
        run: |
          {
            echo "packages<<EOFMARKER"
            if [ "${{ steps.ts.outputs.published }}" = "true" ]; then
              echo "[@unlimited-messaging/sdk@${{ steps.ts.outputs.version }}](https://www.npmjs.com/package/@unlimited-messaging/sdk)"
            fi
            if [ "${{ steps.python.outputs.published }}" = "true" ]; then
              echo "[unlimited-messaging@${{ steps.python.outputs.version }}](https://pypi.org/project/unlimited-messaging/${{ steps.python.outputs.version }}/)"
            fi
            if [ "${{ steps.n8n.outputs.published }}" = "true" ]; then
              echo "[n8n-nodes-unlimited-messaging@${{ steps.n8n.outputs.version }}](https://www.npmjs.com/package/n8n-nodes-unlimited-messaging)"
            fi
            echo "EOFMARKER"
          } >> $GITHUB_OUTPUT

  # ─── Notification de fin ───────────────────────────────────────────────────
  notify-end:
    needs: release
    if: always()
    uses: ./.github/workflows/_discord_notif.yml
    with:
      message: ${{ needs.release.result == 'success' && 'Release pipeline réussie' || 'Release pipeline échouée' }}
      status: ${{ needs.release.result == 'success' && 'success' || 'fail' }}
      packages: ${{ needs.release.outputs.packages }}
    secrets: inherit
