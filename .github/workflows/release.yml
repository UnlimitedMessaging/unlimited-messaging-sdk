name: Release SDKs

on:
  push:
    branches: [main]
    paths:
      - openapi.yaml
      - sdk/n8n/**
  workflow_dispatch:

jobs:
  release:
    name: Generate & publish SDKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: detect
        run: |
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || echo "")
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "openapi.yaml"; then
            echo "openapi_changed=true" >> $GITHUB_OUTPUT
          else
            echo "openapi_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Capture OpenAPI diff (for release notes)
        run: |
          DIFF=$(git diff HEAD~1 -- openapi.yaml 2>/dev/null || echo "")
          {
            echo "OPENAPI_DIFF<<EOFMARKER"
            echo "$DIFF"
            echo "EOFMARKER"
          } >> $GITHUB_ENV

      - name: Install Fern & regenerate SDKs
        if: steps.detect.outputs.openapi_changed == 'true'
        run: |
          npm install -g fern-api
          fern generate --group sdk --local --log-level debug

      - name: Setup npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      # ─── TypeScript SDK ────────────────────────────────────────────────────────
      - name: Check & publish TypeScript SDK
        id: ts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cp LICENSE sdk/typescript/LICENSE
          cd sdk/typescript
          npm install

          TARBALL=$(npm pack | tail -1)
          LOCAL=$(shasum "$TARBALL" | awk '{print $1}')
          REMOTE=$(npm view @unlimited-messaging/sdk dist.shasum 2>/dev/null || echo "none")
          rm -f "$TARBALL"

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "TypeScript SDK unchanged, skipping"
          else
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const [M,m,p] = pkg.version.split('.').map(Number);
              pkg.version = \`\${M}.\${m}.\${p+1}\`;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('TypeScript version:', pkg.version);
            "
            npm publish --access public --provenance
            echo "published=true" >> $GITHUB_OUTPUT
          fi

      # ─── Python SDK ────────────────────────────────────────────────────────────
      - name: Check & publish Python SDK
        id: python
        if: steps.detect.outputs.openapi_changed == 'true'
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install build twine
          cd sdk/python

          python3 -c "
          import re
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          def bump(m):
              return f'version = \"{m.group(1)}.{m.group(2)}.{int(m.group(3))+1}\"'
          content = re.sub(r'version = \"(\d+)\.(\d+)\.(\d+)\"', bump, content, count=1)
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          import re as r2
          v = r2.search(r'version = \"(.+?)\"', content).group(1)
          print('Python version:', v)
          "

          python -m build
          twine upload dist/* --username __token__ --password $PYPI_TOKEN --skip-existing
          echo "published=true" >> $GITHUB_OUTPUT

      # ─── n8n node ──────────────────────────────────────────────────────────────
      - name: Check & publish n8n node
        id: n8n
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cp LICENSE sdk/n8n/LICENSE
          cd sdk/n8n
          npm install
          npm run build

          TARBALL=$(npm pack | tail -1)
          LOCAL=$(shasum "$TARBALL" | awk '{print $1}')
          REMOTE=$(npm view n8n-nodes-unlimited-messaging dist.shasum 2>/dev/null || echo "none")
          rm -f "$TARBALL"

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "n8n node unchanged, skipping"
          else
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              const [M,m,p] = pkg.version.split('.').map(Number);
              pkg.version = \`\${M}.\${m}.\${p+1}\`;
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('n8n node version:', pkg.version);
            "
            npm publish --access public --provenance
            echo "published=true" >> $GITHUB_OUTPUT
          fi

      # ─── Commit version bumps ──────────────────────────────────────────────────
      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/
          git diff --cached --quiet || git commit -m "chore: bump versions [skip ci]"
          git push

      # ─── Release notes + GitHub Release ───────────────────────────────────────
      - name: Generate release notes
        if: steps.ts.outputs.published == 'true' || steps.python.outputs.published == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          VERSION=$(node -e "console.log(require('./sdk/typescript/package.json').version)")
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          NOTES=""

          if [ -n "$OPENAPI_DIFF" ] && [ -n "$GEMINI_API_KEY" ]; then
            NOTES=$(curl -sf \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg diff "$OPENAPI_DIFF" '{
                contents: [{
                  parts: [{
                    text: ("You write release notes for a WhatsApp messaging SDK. Analyze this OpenAPI spec diff and write ONLY what actually changed: new endpoints, removed endpoints, changed parameters, new or removed response fields, renamed methods. If nothing changed in a category, do not mention it. Output only markdown bullet points, no intro sentence, no \"nothing changed\" statements.\n\nDiff:\n" + $diff)
                  }]
                }],
                generationConfig: {}
              }')" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null) || NOTES=""
          fi

          if [ -z "$NOTES" ]; then
            NOTES="SDK update."
          fi

          {
            echo "RELEASE_NOTES<<EOFMARKER"
            echo "$NOTES"
            echo "EOFMARKER"
          } >> $GITHUB_ENV

      - name: Create GitHub Release
        if: steps.ts.outputs.published == 'true' || steps.python.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            --title "v$RELEASE_VERSION" \
            --notes "$RELEASE_NOTES" \
            --latest

      - name: Update CHANGELOG.md
        if: steps.ts.outputs.published == 'true' || steps.python.outputs.published == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const version = process.env.RELEASE_VERSION;
            const notes = process.env.RELEASE_NOTES;
            const date = new Date().toISOString().split('T')[0];
            const newEntry = \`\n## [\${version}] - \${date}\n\n\${notes}\n\`;
            const headerEnd = content.indexOf('\n## ');
            const insertAt = headerEnd === -1 ? content.length : headerEnd;
            const updated = content.slice(0, insertAt) + newEntry + content.slice(insertAt);
            fs.writeFileSync('CHANGELOG.md', updated);
          "
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG for v$RELEASE_VERSION [skip ci]"
          git push
